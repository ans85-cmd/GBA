<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>GBA 2.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { visibility: hidden; }
        :root { --bg:#0a0d14; --panel:#111726; --panel2:#1b2336; --accent:#e2001a; --grid:#27314a; --highlight:#ffd600; }
        body { margin:0; font-family:Segoe UI; background:var(--bg); color:white; }
        .app { display:flex; height:100vh; }
        .sidebar { width: 220px; background-image: url('bg.jpg'); background-size: cover; padding:10px; gap:10px; display:flex; flex-direction:column; }
        .sidebar.collapsed { width: 60px; }
        button { background:var(--accent); border:none; padding:8px; color:white; border-radius:6px; cursor:pointer; }
        .main { flex:1; display:flex; flex-direction:column; }
        .header { background-image: url('bg.jpg'); padding:8px; display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
        input, select { background:var(--panel2); border:1px solid #2a3450; color:white; padding:6px; }
        .container { flex:1; display:flex; gap:10px; padding:10px; overflow:auto; }
        
        .day { min-width:320px; flex: 1; background:var(--panel); display: flex; flex-direction: column; border-radius: 6px; overflow: hidden; max-height: 100%; }
        .day-header { padding:8px; text-align:center; background:var(--panel2); font-weight:bold; position: sticky; top: 0; z-index: 10; }
        
        .tracks-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 8px;
            overflow-y: auto;
            flex: 1;
        }

        .track { background:#0f1524; padding:6px; border-radius: 4px; border: 1px solid #1b2336; }
        .track-title { color:#e2001a; font-size:12px; font-weight:bold; margin-bottom: 4px; }
        .timeline { position:relative; min-height:30px; background: repeating-linear-gradient(to right, var(--grid) 0px, var(--grid) 1px, transparent 1px, transparent calc(100% / 24)); }
        .timeline.drag-over { background-color: rgba(226, 0, 26, 0.15); outline: 1px dashed var(--accent); }
        .train { position:absolute; height:22px; font-size:10px; line-height:22px; text-align:center; cursor:grab; font-weight:bold; border-radius:3px; user-select: none; }
        .train:active { cursor: grabbing; }
        .highlight { outline:2px solid var(--highlight); box-shadow:0 0 8px var(--highlight); }
        
        .bottom { background:#0f1524; border-top:2px solid var(--accent); display:flex; flex-direction:column; transition: all 0.3s ease; }
        .bottom-header { 
            padding: 8px; 
            background: var(--panel2);
            border-bottom: 2px solid var(--accent); 
            font-weight: bold; 
            text-transform: uppercase; 
            font-size: 13px; 
            letter-spacing: 0.5px; 
            cursor: pointer;
            user-select: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .bottom-controls { padding: 6px; }
        .bottom-table { flex:1; overflow:auto; max-height: 200px; }
        .bottom.collapsed .bottom-controls,
        .bottom.collapsed .bottom-table { display: none; }

        table { width:auto; min-width:100%; border-collapse:collapse; }
        th, td { padding:5px; font-size:12px; text-align:center; white-space:nowrap; }
        th { background:#1b2336; position:sticky; top:0; }
        td { border-bottom:1px solid #333; }
        .logo-container { display:flex; justify-content:center; align-items:center; margin-bottom:10px; }
        .logo { max-width:120px; height:auto; }
        .copyright { margin-left: auto; font-size: 11px; color: #FFFFFF; white-space: nowrap; padding-left: 10px; }

        @media print {
            @page {
                size: A4 landscape;
                margin: 10mm;
            }
            body {
                visibility: visible !important;
                background: #ffffff !important;
                color: #000000 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .sidebar, .header, .bottom {
                display: none !important;
            }
            .app, .main, .container {
                display: block !important;
                height: auto !important;
                overflow: visible !important;
                padding: 0 !important;
                margin: 0 !important;
                background: #ffffff !important;
            }
            .day {
                page-break-inside: avoid;
                break-inside: avoid;
                margin-bottom: 20px;
                background: #f8f9fa !important;
                border: 1px solid #ccc;
                color: #000000 !important;
            }
            .day-header {
                background: #e9ecef !important;
                color: #000000 !important;
            }
            .tracks-container {
                display: block !important;
            }
            .track {
                page-break-inside: avoid;
                break-inside: avoid;
                background: #ffffff !important;
                border-bottom: 1px solid #eee;
                margin-bottom: 6px;
            }
            .timeline {
                background: repeating-linear-gradient(to right, #e0e0e0 0px, #e0e0e0 1px, transparent 1px, transparent calc(100% / 24)) !important;
            }
            .track-title {
                color: #333333 !important;
            }
            .train {
                color: #ffffff !important; 
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="logo-container"><img src="logo.png" alt="Logo" class="logo"></div>     
        <button onclick="toggleSidebar()">☰</button>        
        <button onclick="window.open('https://ans85-cmd.github.io/AbstellAPP/AbstellAPP.html', '_blank')">🚆 AbstellA</button>
        <button onclick="exportJSON()">⬇ Export</button>
        <button onclick="clearAll()">🗑 Reset</button>
        <button onclick="deleteSelected()">❌ Löschen</button>
        <button onclick="clearSelection()">↩ Auswahl</button>
        <button onclick="logout()">Logout</button>
        <div class="import-btn" onclick="importFile.click()" style="text-align:center; cursor:pointer; background:#1b2336; padding:8px; border:1px solid #2a3450; border-radius:6px; font-size:12px;">📂 Import</div>
        <input id="importFile" type="file" onchange="importJSON(event)" style="display:none;">
    </div>

    <div class="main">
        <div class="header">
            <select id="tag"><option>Montag</option><option>Dienstag</option><option>Mittwoch</option><option>Donnerstag</option><option>Freitag</option><option>Samstag</option><option>Sonntag</option></select>
            <input id="gleis" placeholder="Gleis">
            <input id="zug" placeholder="Zug" oninput="syncKNOLO()">
            <input id="von" type="time">
            <input id="bis" type="time">
            <input id="farbe" type="color" value="#e2001a">
            <button onclick="addEntry()">Belegung Speichern</button>

            <select id="filterTag" onchange="render()">
                <option value="alle">📅 WOCHE</option>
                <option>Montag</option>
                <option>Dienstag</option>
                <option>Mittwoch</option>
                <option>Donnerstag</option>
                <option>Freitag</option>
                <option>Samstag</option>
                <option>Sonntag</option>
            </select>

            <input id="search" placeholder="🔎 Zug-Suche..." oninput="render()">
            <input id="gleisFilter" placeholder="🛤 Gleis-Filter (z.B. 210, 209)" oninput="render()" style="width: 180px;">
            
            <button onclick="exportPDF()" style="background:#166534; font-weight:bold;">🖨 PDF Export</button>

            <span class="copyright">GBA Version 2.0 (Update 22/07/2026) © Bernhard Kornberger 2026</span>
        </div>
        
        <div id="app" class="container"></div>
        
        <div class="bottom" id="bottomPanel">
            <div class="bottom-header" onclick="toggleBottom()">
                <span>Auswertung KNOLO</span>
                <span id="bottomToggleIcon">▼</span>
            </div>
            <div class="bottom-controls">
                <input id="zugSearch" placeholder="Zugnummer..." oninput="searchKNOLO()">
            </div>
            <div class="bottom-table">
                <table>
                    <thead id="resultHead"></thead>
                    <tbody id="result"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    let sbClient;
    let data = [];
    let knoloData = [];
    let selectedIndex = null;
    const tageReihenfolge = ["Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag", "Sonntag"];

    async function initApp() {
        if (!sbClient) {
            sbClient = supabase.createClient('https://ppuexopggtveafisbfbz.supabase.co', 'sb_publishable_MdNwEGQxq7JsfCjavTDUVw_MZsCeqlH');
        }
        const { data: { session } } = await sbClient.auth.getSession();
        if (!session) { window.location.href = 'login.html'; return; }        
        
        try {
            const resp = await fetch('X99.json');
            if (resp.ok) data = await resp.json();
        } catch (e) { console.warn("Kein X99.json gefunden."); }

        await loadKnoloData();
        document.body.style.visibility = 'visible';
    }

    async function loadKnoloData() {
        try {
            const res = await fetch('knoloData.json');
            knoloData = await res.json();
            render();
        } catch (e) { render(); }
    }

    async function logout() { await sbClient.auth.signOut(); window.location.href = 'login.html'; }
    initApp();

    function toggleSidebar() { document.getElementById("sidebar").classList.toggle("collapsed"); }
    
    function toggleBottom() {
        const bottom = document.getElementById("bottomPanel");
        const icon = document.getElementById("bottomToggleIcon");
        bottom.classList.toggle("collapsed");
        icon.innerText = bottom.classList.contains("collapsed") ? "▲" : "▼";
    }

    function exportPDF() {
        window.print();
    }

    function tmin(t) { let [h,m]=t.split(":").map(Number); return h*60+m; }

    function render() {
        let app = document.getElementById("app"); app.innerHTML = "";
        let searchQuery = document.getElementById("search") ? document.getElementById("search").value.toLowerCase().trim() : "";
        let gleisFilterInput = document.getElementById("gleisFilter") ? document.getElementById("gleisFilter").value.toLowerCase().trim() : "";
        let selectedFilterTag = document.getElementById("filterTag") ? document.getElementById("filterTag").value : "alle";

        let gewuenschteGleise = [];
        if (gleisFilterInput !== "") {
            gewuenschteGleise = gleisFilterInput.split(/[,;\s]+/).filter(Boolean);
        }

        let alleGleiseSet = new Set();
        data.forEach(d => { if(d.gleis) alleGleiseSet.add(d.gleis); });
        let alleGleise = Array.from(alleGleiseSet).sort((a, b) => String(a).localeCompare(String(b), undefined, {numeric: true}));

        let g = {};
        data.forEach((d, i) => {
            g[d.tag] ??= {}; 
            g[d.tag][d.gleis] ??= [];
            g[d.tag][d.gleis].push({...d, index: i});
        });

        Object.keys(g).sort((a,b) => tageReihenfolge.indexOf(a) - tageReihenfolge.indexOf(b)).forEach(tag => {
            if (selectedFilterTag !== "alle" && tag !== selectedFilterTag) return;

            let gleiseFuerTag = alleGleise;

            // NEU: Wenn die Wochenansicht aktiv ist und KEIN manueller Gleis-Filter gesetzt wurde,
            // zeigen wir an jedem Tag NUR die Gleise an, die an diesem Tag auch tatsächlich belegt sind!
            if (selectedFilterTag === "alle" && gewuenschteGleise.length === 0) {
                let belegteGleiseAnDiesemTag = Object.keys(g[tag] || {});
                gleiseFuerTag = alleGleise.filter(gleis => belegteGleiseAnDiesemTag.includes(gleis));
            } else if (gewuenschteGleise.length > 0) {
                gleiseFuerTag = alleGleise.filter(gleis => 
                    gewuenschteGleise.some(gF => String(gleis).toLowerCase().includes(gF))
                );
            }

            if (searchQuery !== "") {
                gleiseFuerTag = gleiseFuerTag.filter(gleis => {
                    let eintraege = (g[tag] && g[tag][gleis]) ? g[tag][gleis] : [];
                    return eintraege.some(t => {
                        let matchesZug = t.zug && t.zug.toLowerCase().includes(searchQuery);
                        let matchesGleis = t.gleis && t.gleis.toLowerCase().includes(searchQuery);
                        return matchesZug || matchesGleis;
                    });
                });
            }

            if (gleiseFuerTag.length === 0) return;

            let day = document.createElement("div"); 
            day.className = "day"; 
            day.innerHTML = `<div class='day-header'>${tag}</div>`;

            let tracksContainer = document.createElement("div");
            tracksContainer.className = "tracks-container";

            gleiseFuerTag.forEach(gleis => {
                let track = document.createElement("div"); 
                track.className = "track"; 
                track.innerHTML = `<div class='track-title'>${gleis}</div>`;
                
                let tl = document.createElement("div"); 
                tl.className = "timeline"; 
                
                tl.ondragover = (e) => { e.preventDefault(); tl.classList.add("drag-over"); };
                tl.ondragleave = () => { tl.classList.remove("drag-over"); };
                tl.ondrop = (e) => {
                    e.preventDefault();
                    tl.classList.remove("drag-over");
                    let draggedIdx = e.dataTransfer.getData("text/plain");
                    if (draggedIdx !== "") {
                        data[draggedIdx].tag = tag;
                        data[draggedIdx].gleis = gleis;
                        selectedIndex = Number(draggedIdx);
                        render();
                    }
                };

                let layers = [];
                let gleisEintraege = (g[tag] && g[tag][gleis]) ? g[tag][gleis] : [];

                gleisEintraege.forEach(t => {
                    let d = document.createElement("div"); 
                    d.className = "train";
                    d.draggable = true;

                    let s1 = tmin(t.von), e1 = tmin(t.bis);
                    let assignedLayer = 0;
                    for(let l=0; l<layers.length; l++) { 
                        if(!layers[l].some(ex => (s1 < ex.end && e1 > ex.start))) { assignedLayer = l; break; } 
                        assignedLayer = l + 1; 
                    }
                    if(!layers[assignedLayer]) layers[assignedLayer] = []; 
                    layers[assignedLayer].push({start: s1, end: e1});

                    d.style.left = s1/1440*100 + "%"; 
                    d.style.width = (e1-s1)/1440*100 + "%"; 
                    d.style.top = assignedLayer*24 + "px";
                    d.style.background = knoloData.find(x => x.ZugNr === t.zug) ? "#166534" : (t.farbe || "#e2001a");
                    
                    d.innerText = t.zug; 
                    d.title = `${t.zug}: ${t.von} bis ${t.bis} (${tag}, ${gleis})`;

                    let matchesSearch = searchQuery !== "" && (
                        (t.zug && t.zug.toLowerCase().includes(searchQuery)) || 
                        (t.gleis && t.gleis.toLowerCase().includes(searchQuery))
                    );

                    if(selectedIndex === t.index || matchesSearch) {
                        d.classList.add("highlight");
                    }

                    d.ondragstart = (e) => {
                        e.dataTransfer.setData("text/plain", t.index);
                    };

                    d.onclick = (e) => { 
                        e.stopPropagation(); 
                        selectedIndex = t.index; 
                        document.getElementById("tag").value=t.tag; 
                        document.getElementById("gleis").value=t.gleis; 
                        document.getElementById("zug").value=t.zug; 
                        document.getElementById("von").value=t.von; 
                        document.getElementById("bis").value=t.bis; 
                        document.getElementById("zugSearch").value=t.zug; 
                        searchKNOLO(); 
                        render(); 
                    };

                    tl.appendChild(d);
                });

                tl.style.height = (Math.max(layers.length, 1) * 24 + 4) + "px";
                track.appendChild(tl); 
                tracksContainer.appendChild(track);
            });

            day.appendChild(tracksContainer);
            app.appendChild(day);
        });
    }

    function searchKNOLO() {
        let val = document.getElementById("zugSearch").value.toLowerCase();
        let head = document.getElementById("resultHead"); let body = document.getElementById("result");
        body.innerHTML = "";
        let gefiltert = knoloData.filter(x => Object.values(x).some(v => String(v).toLowerCase().includes(val)));
        if (gefiltert.length > 0) {
            head.innerHTML = `<tr>${Object.keys(gefiltert[0]).map(k => `<th>${k}</th>`).join("")}</tr>`;
            gefiltert.forEach(r => { let tr = document.createElement("tr"); tr.innerHTML = Object.values(r).map(v => `<td>${v}</td>`).join(""); body.appendChild(tr); });
        }
    }

    function addEntry() {
        let g=document.getElementById("gleis").value, z=document.getElementById("zug").value, v=document.getElementById("von").value, b=document.getElementById("bis").value;
        if(!g || !z || !v || !b) return;
        data.push({ tag: document.getElementById("tag").value, gleis:g, zug:z, von:v, bis:b, farbe: document.getElementById("farbe").value });
        render();
    }
    function deleteSelected() { if(selectedIndex !== null) { data.splice(selectedIndex, 1); selectedIndex = null; render(); } }
    function clearSelection() { selectedIndex = null; render(); }
    function clearAll() { data = []; render(); }
    function syncKNOLO() { document.getElementById("zugSearch").value = document.getElementById("zug").value; searchKNOLO(); }
    function exportJSON() { let b = new Blob([JSON.stringify(data)]); let a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = "data.json"; a.click(); }
    function importJSON(e) { let f=e.target.files[0]; if(!f) return; let r=new FileReader(); r.onload=x=>{data=JSON.parse(x.target.result); render();}; r.readAsText(f); }
</script>
</body>
</html>
