
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>GBA 1.0</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:#0a0d14;
  --panel:#111726;
  --panel2:#1b2336;
  --accent:#e2001a;
  --grid:#27314a;
  --highlight:#ffd600;
}

body { margin:0; font-family:Segoe UI; background:var(--bg); color:white; }
.app { display:flex; height:100vh; }

.sidebar {
  width: 220px;
  background-image: url('bg.jpg'); 
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  
  display: flex;
  flex-direction: column;
  padding: 10px;
  gap: 10px;
}
.sidebar.collapsed { width: 60px; }

button {
  background:var(--accent);
  border:none;
  padding:8px;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.import-btn {
  background:#1b2336;
  border:1px solid #2a3450;
  padding:8px;
  text-align:center;
  cursor:pointer;
}

#importFile { display:none; }

.file-name {
  font-size:11px;
  color:#aaa;
  text-align:center;
}

.footer {
  margin-top:auto;
  font-size:10px;
  text-align:center;
}

.main { flex:1; display:flex; flex-direction:column; }

.header {
  display: flex;
  gap: 6px;
  padding: 8px;
  
  /* Hintergrundbild hinzufügen */
  background-image: url('bg.jpg'); 
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  
  flex-wrap: wrap;
}
input, select {
  background:var(--panel2);
  border:1px solid #2a3450;
  color:white;
  padding:6px;
}

.container {
  flex:1;
  display:flex;
  gap:10px;
  padding:10px;
  overflow:auto;
}

.day { min-width:280px; background:var(--panel); }
.day-header { padding:6px; text-align:center; background:var(--panel2); }

.track { background:#0f1524; margin:6px; padding:6px; }
.track-title { color:#e2001a; font-size:12px; }

.timeline {
  position:relative;
  min-height:30px; /* Dynamische Höhe je nach Zeilenanzahl */
  background: repeating-linear-gradient(
    to right,
    var(--grid) 0px,
    var(--grid) 1px,
    transparent 1px,
    transparent calc(100% / 24)
  );
}

.train {
  position:absolute;
  height:22px;
  font-size:10px;
  line-height:22px;
  text-align:center;
  cursor:pointer;
}

.highlight {
  outline:2px solid var(--highlight);
  box-shadow:0 0 8px var(--highlight);
}

.bottom {
  height:270px;
  background:#0f1524;
  border-top:2px solid var(--accent);
  display:flex;
  flex-direction:column;
}

.bottom-header { padding:8px; background:var(--accent); }
.bottom-controls { padding:8px; }

.bottom-table { flex:1; overflow:auto; }

table { width:100%; border-collapse:collapse; }

th, td {
  padding:5px;
  font-size:12px;
  text-align:center;
}

th { background:#1b2336; }
td { border-bottom:1px solid #333; }

.status-aktion { color:#f59e0b; font-weight:bold; }

.logo-container {
  display:flex;
  justify-content:center;
  align-items:center;
  margin-bottom:10px;
}

.logo {
  max-width:120px;
  height:auto;
}

</style>
</head>

<body>

<div class="app">

<div class="sidebar" id="sidebar">
  <div class="logo-container">
  <img src="logo.png" alt="Logo" class="logo">
  </div>
  <button onclick="toggleSidebar()">☰</button>
  <button onclick="exportJSON()">⬇ Export</button>
  <button onclick="clearAll()">🗑 Reset</button>

  <button onclick="deleteSelected()">❌ Löschen</button>
  <button onclick="clearSelection()">↩ Auswahl</button>
  <button onclick="logout()">Logout</button>
  <div class="import-btn" onclick="importFile.click()">📂 Import</div>
  <div class="file-name" id="fileName">keine Datei</div>
  <input id="importFile" type="file" onchange="importJSON(event)">

  <div class="footer">(c) bk2026</div>
</div>

<div class="main">

<div class="header">
  <select id="tag">
    <option>Montag</option><option>Dienstag</option><option>Mittwoch</option>
    <option>Donnerstag</option><option>Freitag</option><option>Samstag</option><option>Sonntag</option>
  </select>

  <input id="gleis" placeholder="Gleis">
  <input id="zug" placeholder="Zug" oninput="syncKNOLO()">
  <input id="von" type="time">
  <input id="bis" type="time">

  <input id="farbe" type="color" value="#e2001a">

  <button onclick="addEntry()">Speichern</button>

  <input id="search" placeholder="🔎 Suche..." oninput="render()">
</div>

<div id="app" class="container"></div>

<div class="bottom">
<div class="bottom-header">Auswertung KNOLO</div>

<div class="bottom-controls">
  <input id="zugSearch" placeholder="Zugnummer..." oninput="searchKNOLO()">
</div>

<div class="bottom-table">

<thead>
<tr>
<th>ZugNr</th><th>Datum</th><th>Art</th><th>Ankunft</th>

</thead>
<tbody id="result"></tbody>
</table>
</div>
</div>

</div>

    "AnzFzg": "1"
  }
 ]

// Automatisches Laden von X99.json beim Start der Webapp
window.onload = function() {
  fetch('X99.json')
    .then(response => {
      if (!response.ok) throw new Error('Datei nicht gefunden');
      return response.json();
    })
    .then(parsed => {
      if (Array.isArray(parsed)) {
        data = parsed;
        fileName.innerText = "X99.json";
        render();
      }
    })
    .catch(err => {
      console.log("X99.json konnte nicht automatisch geladen werden (lokaler Test ohne Server oder Datei fehlt).", err);
    });
};

function toggleSidebar(){
  sidebar.classList.toggle("collapsed")
}

function addEntry(){
  if(!gleis.value||!zug.value||!von.value||!bis.value) return

  let obj={
    tag:tag.value,
    gleis:gleis.value,
    zug:zug.value,
    von:von.value,
    bis:bis.value,
    farbe:farbe.value
  }

  if(selectedIndex!==null){
    data[selectedIndex]=obj
  } else {
    data.push(obj)
  }

  selectedIndex=null
  render()
}

function deleteSelected(){
  if(selectedIndex===null) return
  data.splice(selectedIndex,1)
  selectedIndex=null
  render()
}

function clearSelection(){
  selectedIndex=null
  render()
}

function tmin(t){
  let [h,m]=t.split(":").map(Number)
  return h*60+m
}

function render(){
  let app=document.getElementById("app")
  let s=search.value.toLowerCase()
  app.innerHTML=""

  let g={}
  data.forEach((d,i)=>{
    g[d.tag]??={}
    g[d.tag][d.gleis]??=[]
    g[d.tag][d.gleis].push({...d,index:i})
  })

  Object.keys(g)
  .sort((a, b) => tageReihenfolge.indexOf(a) - tageReihenfolge.indexOf(b))
  .forEach(tag => {
    let day=document.createElement("div")
    day.className="day"
    day.innerHTML=`<div class='day-header'>${tag}</div>`

    Object.keys(g[tag]).forEach(gleis=>{
      let tl=document.createElement("div")
      tl.className="timeline"

      // Spuren/Ebenen für überlappungsfreie Anzeige berechnen
      let layers = []; // Array von Arrays, die besetzte Zeitspannen speichern

      g[tag][gleis].forEach((t)=>{
        let d=document.createElement("div")
        d.className="train"

        let s1=tmin(t.von)
        let e1=tmin(t.bis)

        // Finde die erste Ebene, auf der dieser Zug Platz hat
        let assignedLayer = 0;
        for (let l = 0; l < layers.length; l++) {
          let hasOverlap = layers[l].some(existing => {
            return (s1 < existing.end && e1 > existing.start);
          });
          if (!hasOverlap) {
            assignedLayer = l;
            break;
          }
          assignedLayer = l + 1;
        }

        if (!layers[assignedLayer]) {
          layers[assignedLayer] = [];
        }
        layers[assignedLayer].push({ start: s1, end: e1 });

        d.style.left=s1/1440*100+"%"
        d.style.width=(e1-s1)/1440*100+"%"
        d.style.top=assignedLayer*24+"px";

        // 🎨 Farbe
        let knolo=knoloData.find(x=>x.ZugNr===t.zug)
        d.style.background = knolo ? "#166534" : (t.farbe || "#e2001a")

        d.innerText=t.zug

        if(selectedIndex===t.index) d.classList.add("highlight")

        if((t.zug+t.gleis+t.tag).toLowerCase().includes(s)){
          d.classList.add("highlight")
        }

        d.onclick=()=>{
          selectedIndex=t.index
          let sel=data[t.index]

          tag.value=sel.tag
          gleis.value=sel.gleis
          zug.value=sel.zug
          von.value=sel.von
          bis.value=sel.bis
          farbe.value=sel.farbe || "#e2001a"

          zugSearch.value=sel.zug
          searchKNOLO()

          render()
        }

        tl.appendChild(d)
      })

      // Höhe der Timeline dynamisch anpassen, basierend auf der Anzahl der benötigten Zeilen
      let maxLayer = layers.length > 0 ? layers.length : 1;
      tl.style.height = (maxLayer * 24 + 4) + "px";

      let track=document.createElement("div")
      track.className="track"
      track.innerHTML=`<div class='track-title'>${gleis}</div>`
      track.appendChild(tl)

      day.appendChild(track)
    })

    app.appendChild(day)
  })
}

function searchKNOLO(){
  let val = zugSearch.value
  result.innerHTML = ""

  let gefiltert = knoloData.filter(x => x.ZugNr.includes(val))
  if (gefiltert.length === 0) return

  // 👉 Alle Keys aus JSON holen
  let keys = Object.keys(gefiltert[0])

  // 👉 HEADER dynamisch bauen
  let thead = document.querySelector("thead")
  thead.innerHTML = "<tr>" + keys.map(k => `<th>${k}</th>`).join("") + "</tr>"

  // 👉 DATENZEILEN
  gefiltert.forEach(r=>{
    let tr = document.createElement("tr")

    tr.innerHTML = keys.map(k => {
      let value = r[k] || "-"

      // Sonderformat für Aktion (farbig)
      if(k === "Aktion"){
        return `<td class="status-aktion">${value}</td>`
      }

      return `<td>${value}</td>`
    }).join("")

    result.appendChild(tr)
  })
}

function syncKNOLO(){
  zugSearch.value=zug.value
  searchKNOLO()
}

function exportJSON(){
  let b=new Blob([JSON.stringify(data)])
  let a=document.createElement("a")
  a.href=URL.createObjectURL(b)
  a.click()
}

function importJSON(e){
  let f=e.target.files[0]
  if(!f) return

  fileName.innerText=f.name

  let r=new FileReader()
  r.onload=x=>{
    try{
      let parsed=JSON.parse(x.target.result)
      if(Array.isArray(parsed)){
        data=parsed
        selectedIndex=null
        render()
      } else alert("Ungültig")
    } catch{
      alert("Fehler beim Import")
    }
  }
  r.readAsText(f)
}

function clearAll(){
  data=[]
  selectedIndex=null
  render()
}

render()
</script>
